<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brasseries de France — Carte par département</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f5f3ef;
      --surface:  #ffffff;
      --card:     #fafaf8;
      --border:   #ddd9d0;
      --accent:   #1a3a6b;
      --accent2:  #c8342a;
      --text:     #1a1a1a;
      --muted:    #6b6760;
      --radius:   6px;
      --mono:     'IBM Plex Mono', monospace;
      --sans:     'IBM Plex Sans', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 0 24px;
      height: 52px;
      flex-shrink: 0;
    }
    .topbar-logo {
      font-family: var(--mono);
      font-weight: 600;
      font-size: .95rem;
      letter-spacing: .04em;
      white-space: nowrap;
    }
    .topbar-logo span { color: #a8c4f5; }
    .topbar-sep { width: 1px; height: 24px; background: rgba(255,255,255,.25); }
    .topbar-sub { font-size: .78rem; color: rgba(255,255,255,.65); }

    .toolbar {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .toolbar label {
      font-family: var(--mono);
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .toolbar select, .toolbar input {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: .82rem;
      padding: 7px 12px;
      outline: none;
    }
    .toolbar select:focus, .toolbar input:focus { border-color: var(--accent); }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .scan-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: .7rem;
      color: var(--muted);
    }
    .scan-status .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #map { flex: 1; }

    .dept-tooltip {
      font-family: var(--sans);
      font-size: .82rem;
      font-weight: 600;
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
    }
    .dept-tooltip .code {
      font-family: var(--mono);
      font-size: .7rem;
      color: var(--accent);
      margin-right: 4px;
    }
    .dept-tooltip .tt-count {
      font-family: var(--mono);
      font-weight: 700;
      color: var(--accent2);
    }
    .dept-tooltip .status {
      font-size: .65rem;
      font-weight: 400;
      color: var(--muted);
      display: block;
      margin-top: 2px;
    }

    .leaflet-popup-content-wrapper {
      border-radius: var(--radius) !important;
      font-family: var(--sans) !important;
      box-shadow: 0 4px 20px rgba(0,0,0,.12) !important;
      border: 1px solid var(--border) !important;
    }

    /* Count labels on map */
    .dept-label {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      color: #1a3a6b;
      text-shadow: 0 0 3px #fff, 0 0 3px #fff, 1px 1px 0 #fff, -1px -1px 0 #fff;
      white-space: nowrap;
      pointer-events: none;
    }
    .dept-label.has-data { color: #7a2520; }
    .dept-label.no-data { color: #bbb; font-weight: 400; font-size: 9px; }

    .info-panel {
      position: absolute;
      bottom: 24px;
      left: 24px;
      z-index: 1000;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      box-shadow: 0 4px 16px rgba(0,0,0,.1);
      font-size: .78rem;
      color: var(--muted);
      max-width: 300px;
      line-height: 1.5;
    }
    .info-panel strong { color: var(--text); }
    .info-panel .total {
      font-family: var(--mono);
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--accent);
      display: block;
      margin-bottom: 4px;
    }

    .color-scale {
      position: absolute;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,.1);
      font-size: .68rem;
      color: var(--muted);
    }
    .color-scale-title {
      font-family: var(--mono);
      font-weight: 600;
      font-size: .62rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .color-scale-bar {
      width: 120px;
      height: 12px;
      border-radius: 3px;
      margin-bottom: 4px;
    }
    .color-scale-labels {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: .6rem;
    }

    .auto-group {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .auto-group .field-group input {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: .75rem;
      padding: 7px 10px;
      width: 190px;
      outline: none;
    }
    .auto-group .field-group input:focus { border-color: var(--accent); }
    .btn-auto {
      background: var(--accent2);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: .75rem;
      font-weight: 600;
      padding: 7px 14px;
      cursor: pointer;
      white-space: nowrap;
      align-self: flex-end;
    }
    .btn-auto:hover { background: #a02820; }
    .btn-auto:disabled { background: #999; cursor: default; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">SIRENE<span>.explorer</span></div>
  <div class="topbar-sep"></div>
  <div class="topbar-sub">Carte des départements — Cliquez pour voir les établissements</div>
</div>

<div class="toolbar">
  <div class="field-group">
    <label>Code NAF</label>
    <select id="nafSelect" onchange="updateNaf()">
      <option value="11.05Z" selected>11.05Z — Fabrication de bière</option>
      <option value="56.30Z">56.30Z — Débits de boissons</option>
      <option value="56.10A">56.10A — Restauration traditionnelle</option>
      <option value="10.71C">10.71C — Boulangerie-pâtisserie</option>
      <option value="47.61Z">47.61Z — Commerce de détail de livres</option>
      <option value="59.14Z">59.14Z — Projection de films</option>
      <option value="55.10Z">55.10Z — Hôtels</option>
      <option value="86.21Z">86.21Z — Médecine générale</option>
      <option value="96.02A">96.02A — Coiffure</option>
      <option value="93.11Z">93.11Z — Installations sportives</option>
    </select>
  </div>

  <div class="auto-group">
    <div class="field-group">
      <label>Clé API INSEE</label>
      <input id="inseeKey" type="password" placeholder="X-INSEE-Api-Key-Integration" />
    </div>
    <div class="field-group">
      <label>Token GitHub</label>
      <input id="ghToken" type="password" placeholder="repo scope" />
    </div>
    <button class="btn-auto" id="btnAuto" onclick="autoUpdate()">⟳ Mise à jour</button>
  </div>

  <div class="scan-status" id="scanStatus"></div>
</div>

<div id="map"></div>

<div class="info-panel" id="infoPanel">
  <span class="total" id="totalCount">—</span>
  <strong>Établissements trouvés</strong><br/>
  <span id="infoDetails">Scan des fichiers d'export en cours…</span>
</div>

<div class="color-scale" id="colorScale" style="display:none">
  <div class="color-scale-title">Établissements</div>
  <div class="color-scale-bar" id="scaleBar"></div>
  <div class="color-scale-labels">
    <span id="scaleMin">0</span>
    <span id="scaleMax">—</span>
  </div>
</div>

<script>
const DEPT_NAMES = {
  "01":"Ain","02":"Aisne","03":"Allier","04":"Alpes-de-Haute-Provence","05":"Hautes-Alpes",
  "06":"Alpes-Maritimes","07":"Ardèche","08":"Ardennes","09":"Ariège","10":"Aube",
  "11":"Aude","12":"Aveyron","13":"Bouches-du-Rhône","14":"Calvados","15":"Cantal",
  "16":"Charente","17":"Charente-Maritime","18":"Cher","19":"Corrèze","20":"Corse",
  "21":"Côte-d'Or","22":"Côtes-d'Armor","23":"Creuse","24":"Dordogne",
  "25":"Doubs","26":"Drôme","27":"Eure","28":"Eure-et-Loir","29":"Finistère",
  "30":"Gard","31":"Haute-Garonne","32":"Gers","33":"Gironde","34":"Hérault",
  "35":"Ille-et-Vilaine","36":"Indre","37":"Indre-et-Loire","38":"Isère","39":"Jura",
  "40":"Landes","41":"Loir-et-Cher","42":"Loire","43":"Haute-Loire","44":"Loire-Atlantique",
  "45":"Loiret","46":"Lot","47":"Lot-et-Garonne","48":"Lozère","49":"Maine-et-Loire",
  "50":"Manche","51":"Marne","52":"Haute-Marne","53":"Mayenne","54":"Meurthe-et-Moselle",
  "55":"Meuse","56":"Morbihan","57":"Moselle","58":"Nièvre","59":"Nord",
  "60":"Oise","61":"Orne","62":"Pas-de-Calais","63":"Puy-de-Dôme","64":"Pyrénées-Atlantiques",
  "65":"Hautes-Pyrénées","66":"Pyrénées-Orientales","67":"Bas-Rhin","68":"Haut-Rhin","69":"Rhône",
  "70":"Haute-Saône","71":"Saône-et-Loire","72":"Sarthe","73":"Savoie","74":"Haute-Savoie",
  "75":"Paris","76":"Seine-Maritime","77":"Seine-et-Marne","78":"Yvelines","79":"Deux-Sèvres",
  "80":"Somme","81":"Tarn","82":"Tarn-et-Garonne","83":"Var","84":"Vaucluse",
  "85":"Vendée","86":"Vienne","87":"Haute-Vienne","88":"Vosges","89":"Yonne",
  "90":"Territoire de Belfort","91":"Essonne","92":"Hauts-de-Seine","93":"Seine-Saint-Denis",
  "94":"Val-de-Marne","95":"Val-d'Oise"
};

let currentNaf = '11.05Z';
let geoLayer = null;
let deptCounts = {};   // { "38": 12, "69": 5, ... }
let deptLabels = [];   // L.marker label references
let cachedGeoJson = null;

const map = L.map('map', { zoomSnap: 0.25 }).setView([46.6, 2.5], 6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> · © <a href="https://carto.com/">CARTO</a>',
  maxZoom: 19,
}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
  maxZoom: 19, pane: 'overlayPane'
}).addTo(map);

function nafSlug(naf) {
  return naf.replace(/[^a-z0-9]/gi, '-');
}

// Fusionne les features 2A et 2B en un seul MultiPolygon "20"
function preprocessGeoJson(data) {
  function toPolygons(feat) {
    if (!feat) return [];
    const g = feat.geometry;
    return g.type === 'Polygon' ? [g.coordinates] : g.coordinates;
  }
  const f2A = data.features.find(f => f.properties.code === '2A');
  const f2B = data.features.find(f => f.properties.code === '2B');
  const corseFeat = {
    type: 'Feature',
    properties: { code: '20', nom: 'Corse' },
    geometry: { type: 'MultiPolygon', coordinates: [...toPolygons(f2A), ...toPolygons(f2B)] }
  };
  const others = data.features.filter(f => f.properties.code !== '2A' && f.properties.code !== '2B');
  return { ...data, features: [...others, corseFeat] };
}

function exportUrl(deptCode) {
  const prefix = 'exports/';
  return prefix + 'sirene-' + nafSlug(currentNaf) + '-' + deptCode + '.html';
}

// Color scale: light blue (0) → dark red (max)
const COLORS = ['#eef3fb','#d0dff5','#a3c1ea','#6a9bd6','#d4845a','#c8572e','#a83220','#7a1a14'];

function getColor(count, maxCount) {
  if (count === null) return '#f0eeea';
  if (count === 0) return '#f0eeea';
  const ratio = Math.min(count / Math.max(maxCount, 1), 1);
  const idx = Math.min(Math.floor(ratio * (COLORS.length - 1)), COLORS.length - 1);
  return COLORS[idx];
}

function getMaxCount() {
  const vals = Object.values(deptCounts).filter(v => v !== null && v > 0);
  return vals.length ? Math.max(...vals) : 1;
}

function styleForDept(feature) {
  const code = feature.properties.code;
  const count = deptCounts[code] ?? null;
  const maxC = getMaxCount();
  return {
    fillColor: getColor(count, maxC),
    fillOpacity: count > 0 ? 0.75 : 0.3,
    color: count > 0 ? '#1a3a6b' : '#ccc',
    weight: 1.2,
    opacity: 0.6,
  };
}

function styleHover() {
  return {
    fillColor: '#c8342a',
    fillOpacity: 0.6,
    color: '#c8342a',
    weight: 2.5,
    opacity: 1,
  };
}

function tooltipHtml(code) {
  const name = DEPT_NAMES[code] || code;
  const count = deptCounts[code];
  const countStr = count !== undefined && count !== null
    ? '<span class="tt-count">' + count + ' établissement' + (count > 1 ? 's' : '') + '</span>'
    : '<span style="color:#bbb">Pas d\'export</span>';
  return '<div class="dept-tooltip">' +
    '<span class="code">' + code + '</span> ' + name + '<br/>' +
    countStr +
    '<span class="status">→ ' + 'sirene-' + nafSlug(currentNaf) + '-' + code + '.html</span>' +
    '</div>';
}

function onEachDept(feature, layer) {
  const code = feature.properties.code;
  layer.bindTooltip(tooltipHtml(code), { sticky: true, direction: 'top', offset: [0, -10] });
  layer.on('mouseover', function () { this.setStyle(styleHover()); this.bringToFront(); });
  layer.on('mouseout', function () { geoLayer.resetStyle(this); });
  layer.on('click', function () { window.open(exportUrl(code), '_blank'); });
}

function clearLabels() {
  deptLabels.forEach(m => map.removeLayer(m));
  deptLabels = [];
}

function addLabels() {
  clearLabels();
  if (!geoLayer) return;
  geoLayer.eachLayer(function (layer) {
    const code = layer.feature.properties.code;
    const count = deptCounts[code];
    // Pour la Corse (MultiPolygon), le centre de la bbox tombe en mer — on fixe manuellement
    const center = code === '20' ? L.latLng(42.1, 9.1) : layer.getBounds().getCenter();
    let labelText, cssClass;
    if (count !== undefined && count !== null && count > 0) {
      labelText = String(count);
      cssClass = 'dept-label has-data';
    } else if (count === 0) {
      labelText = '0';
      cssClass = 'dept-label no-data';
    } else {
      labelText = '—';
      cssClass = 'dept-label no-data';
    }
    const marker = L.marker(center, {
      icon: L.divIcon({ className: cssClass, html: labelText, iconSize: [30, 14], iconAnchor: [15, 7] }),
      interactive: false,
    }).addTo(map);
    deptLabels.push(marker);
  });
}

function loadGeoJson(data) {
  if (geoLayer) map.removeLayer(geoLayer);
  geoLayer = L.geoJSON(data, {
    style: styleForDept,
    onEachFeature: onEachDept,
    filter: function (feature) { return !!DEPT_NAMES[feature.properties.code]; }
  }).addTo(map);
  addLabels();
}

function refreshMap() {
  if (!cachedGeoJson) return;
  loadGeoJson(cachedGeoJson);
  updateInfoPanel();
  updateColorScale();
}

function updateInfoPanel() {
  const counts = Object.values(deptCounts).filter(v => v !== null && v > 0);
  const total = counts.reduce((a, b) => a + b, 0);
  const nbDepts = counts.length;
  document.getElementById('totalCount').textContent = total.toLocaleString('fr-FR');
  document.getElementById('infoDetails').innerHTML =
    '<strong>' + nbDepts + '</strong> département' + (nbDepts > 1 ? 's' : '') + ' avec données<br/>' +
    'Cliquez sur un département pour ouvrir sa carte.';
}

function updateColorScale() {
  const maxC = getMaxCount();
  if (maxC <= 0) return;
  const scale = document.getElementById('colorScale');
  scale.style.display = '';
  document.getElementById('scaleBar').style.background =
    'linear-gradient(90deg, ' + COLORS.join(', ') + ')';
  document.getElementById('scaleMin').textContent = '0';
  document.getElementById('scaleMax').textContent = maxC;
}

async function fetchCount(rawCode) {
  try {
    const res = await fetch(exportUrl(rawCode));
    if (!res.ok) return null;
    const html = await res.text();
    const match = html.match(/const D=(\[[\s\S]*?\]);/);
    if (match) {
      try { return JSON.parse(match[1]).length; } catch {}
    }
    const titleMatch = html.match(/(\d+)\s*[eé]tablissements/);
    return titleMatch ? parseInt(titleMatch[1], 10) : null;
  } catch {
    return null;
  }
}

// Scan export files to extract establishment counts
async function scanExports() {
  const statusEl = document.getElementById('scanStatus');
  const codes = Object.keys(DEPT_NAMES);
  let scanned = 0;
  deptCounts = {};

  statusEl.innerHTML = '<div class="spinner"></div> Scan 0/' + codes.length;

  // Scan in batches of 6 to avoid hammering
  const BATCH = 6;
  for (let i = 0; i < codes.length; i += BATCH) {
    const batch = codes.slice(i, i + BATCH);
    await Promise.all(batch.map(async (code) => {
      deptCounts[code] = await fetchCount(code);
    }));
    scanned += batch.length;
    statusEl.innerHTML = '<div class="spinner"></div> Scan ' + Math.min(scanned, codes.length) + '/' + codes.length;
    refreshMap();
  }

  const found = Object.values(deptCounts).filter(v => v !== null && v > 0).length;
  statusEl.innerHTML = '&#x2714; ' + found + '/' + codes.length + ' fichiers trouvés';
  refreshMap();
}

// ── Helpers SIRENE ────────────────────────────────────────────────────────────

function buildAddr(etab) {
  const a = etab.adresseEtablissement || {};
  const line1 = [a.numeroVoieEtablissement, a.typeVoieEtablissement, a.libelleVoieEtablissement].filter(Boolean).join(' ');
  const line2 = [a.codePostalEtablissement, a.libelleCommuneEtablissement].filter(Boolean).join(' ');
  return { line1, line2 };
}

function getName(etab) {
  const ul = etab.uniteLegale || {};
  return ul.denominationUniteLegale
    || [ul.prenom1UniteLegale, ul.nomUniteLegale].filter(Boolean).join(' ')
    || '(sans dénomination)';
}

async function geocodeEtab(etab) {
  const { line1, line2 } = buildAddr(etab);
  const q = [line1, line2].filter(Boolean).join(' ').trim();
  if (!q) return null;
  try {
    const r = await fetch('https://api-adresse.data.gouv.fr/search/?q=' + encodeURIComponent(q) + '&limit=1');
    const d = await r.json();
    if (d.features?.length) {
      const [lon, lat] = d.features[0].geometry.coordinates;
      return { lat, lon };
    }
  } catch {}
  return null;
}

async function fetchSireneApi(q, inseeKey) {
  const url = 'https://api.insee.fr/api-sirene/3.11/siret?q=' + encodeURIComponent(q) + '&nombre=200&debut=0';
  const res = await fetch(url, {
    headers: { 'Accept': 'application/json', 'X-INSEE-Api-Key-Integration': inseeKey }
  });
  if (res.status === 404) return [];
  if (res.status === 401) throw new Error('Clé API INSEE invalide (401)');
  if (res.status === 429) throw new Error('Quota API INSEE dépassé (429)');
  if (!res.ok) throw new Error('API SIRENE ' + res.status);
  const data = await res.json();
  return (data.etablissements || []).filter(
    et => et.periodesEtablissement?.[0]?.etatAdministratifEtablissement === 'A'
  );
}

function buildDeptExportHtml(exportData, nafCode, deptCode, deptName) {
  const count = exportData.length;
  const title = 'Sirene — ' + nafCode + ' · ' + deptCode + ' ' + deptName + ' — ' + count + ' établissements';
  const now = new Date().toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' });

  const dataJson = JSON.stringify(exportData.map(d => ({
    name: d.name, siret: d.siret, naf: d.naf, etat: d.etat,
    a1: d.addr.line1 || '', a2: d.addr.line2 || '', lat: d.lat, lon: d.lon
  })));

  const listHtml = exportData.map((d, i) => {
    const addr = [d.addr.line1, d.addr.line2].filter(Boolean).join(', ') || '—';
    const etatCls = d.etat === 'A' ? 'actif' : 'ferme';
    const etatLbl = d.etat === 'A' ? 'Actif' : 'Fermé';
    return '<div class="card" data-i="' + i + '">'
      + '<div class="name">' + d.name + '</div>'
      + '<div class="siret">' + d.siret + '</div>'
      + '<div class="tags"><span class="tnaf">' + d.naf + '</span>'
      + '<span class="tetat ' + etatCls + '">' + etatLbl + '</span></div>'
      + '<div class="addr">📍 ' + addr + '</div></div>';
  }).join('');

  const css = '*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}'
    + 'body{font-family:system-ui,sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden;background:#f5f3ef;color:#1a1a1a}'
    + 'header{background:#1a3a6b;color:#fff;padding:10px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}'
    + 'h1{font-size:.95rem;font-weight:700}.meta{font-size:.72rem;opacity:.65;margin-left:auto}'
    + '.body{display:flex;flex:1;overflow:hidden}'
    + '.sb{width:320px;flex-shrink:0;background:#fff;border-right:1px solid #ddd;display:flex;flex-direction:column;overflow:hidden}'
    + '.sbh{padding:9px 14px;border-bottom:1px solid #ddd;font-size:.72rem;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.05em}'
    + '.list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}'
    + '.list::-webkit-scrollbar{width:4px}.list::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}'
    + '.card{background:#fafaf8;border:1px solid #e5e2d9;border-left:3px solid transparent;border-radius:6px;padding:10px 12px;cursor:pointer;transition:border-color .15s}'
    + '.card:hover{border-left-color:#1a3a6b}.card.active{border-left-color:#c8342a;background:#fff8f7}'
    + '.name{font-weight:600;font-size:.85rem;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}'
    + '.siret{font-family:monospace;font-size:.64rem;color:#aaa;margin-bottom:4px}'
    + '.tags{display:flex;gap:4px;margin-bottom:5px}'
    + '.tnaf{background:#e8eef8;color:#1a3a6b;border-radius:3px;font-size:.65rem;padding:2px 6px;font-weight:600}'
    + '.tetat{border-radius:3px;font-size:.65rem;padding:2px 6px;font-weight:600}'
    + '.actif{background:#e6f4ec;color:#2d7a50}.ferme{background:#fdecea;color:#c8342a}'
    + '.addr{font-size:.75rem;color:#999}'
    + '#map{flex:1}'
    + '.leaflet-popup-content-wrapper{border-radius:6px!important;font-family:system-ui,sans-serif!important}'
    + '.pname{font-weight:700;font-size:.85rem;margin-bottom:3px}'
    + '.pnaf{font-family:monospace;font-size:.72rem;color:#1a3a6b;margin-bottom:4px}'
    + '.paddr{font-size:.75rem;color:#999}';

  const js = 'const D=' + dataJson + ';'
    + 'const map=L.map("map");'
    + 'L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap",maxZoom:19}).addTo(map);'
    + 'function mk(a){const c=a?"#c8342a":"#1a3a6b",s=\'<svg xmlns="http://www.w3.org/2000/svg" width="24" height="32" viewBox="0 0 24 32"><path d="M12 0C5.37 0 0 5.37 0 12c0 9 12 20 12 20S24 21 24 12C24 5.37 18.63 0 12 0z" fill="\'+c+\'"/><circle cx="12" cy="12" r="4.5" fill="#fff"/></svg>\';return L.divIcon({html:s,className:"",iconSize:[24,32],iconAnchor:[12,32],popupAnchor:[0,-34]});}'
    + 'let aC=null,aM=null;'
    + 'const cards=document.querySelectorAll(".card"),ml=[];'
    + 'D.forEach(function(d,i){'
    + 'const m=L.marker([d.lat,d.lon],{icon:mk(false)}).addTo(map);'
    + 'm.bindPopup(\'<div class="pname">\'+d.name+\'</div><div class="pnaf">\'+d.naf+\'</div><div class="paddr">📍 \'+(d.a1?d.a1+" ":"")+d.a2+\'</div>\');'
    + 'ml.push(m);'
    + 'function activate(ci,mi){if(aC)aC.classList.remove("active");if(aM)aM.setIcon(mk(false));ci.classList.add("active");aC=ci;mi.setIcon(mk(true));aM=mi;}'
    + 'cards[i].addEventListener("click",function(){activate(cards[i],m);map.setView([d.lat,d.lon],15);m.openPopup();});'
    + 'm.on("click",function(){activate(cards[i],m);cards[i].scrollIntoView({behavior:"smooth",block:"nearest"});});'
    + '});'
    + 'if(ml.length){const g=L.featureGroup(ml);map.fitBounds(g.getBounds().pad(0.12));}';

  return [
    '<!DOCTYPE html><html lang="fr"><head>',
    '<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>',
    '<title>' + title + '</title>',
    '<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>',
    '<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"><\/script>',
    '<style>' + css + '</style></head><body>',
    '<header><h1>📍 ' + title + '</h1><div class="meta">Exporté le ' + now + ' — API Sirene INSEE</div></header>',
    '<div class="body"><div class="sb"><div class="sbh">' + count + ' établissements</div>',
    '<div class="list">' + listHtml + '</div></div><div id="map"></div></div>',
    '<script>' + js + '<\/script>',
    '</body></html>'
  ].join('');
}

async function pushFileToGithub(token, filePath, content) {
  const OWNER = 'chatainsim', REPO = 'beer-maps', BRANCH = 'main';
  let sha = null;
  try {
    const r = await fetch(
      'https://api.github.com/repos/' + OWNER + '/' + REPO + '/contents/' + encodeURIComponent(filePath) + '?ref=' + BRANCH,
      { headers: { Authorization: 'Bearer ' + token } }
    );
    if (r.ok) sha = (await r.json()).sha;
  } catch {}
  const body = { message: 'auto: update ' + filePath, content: btoa(unescape(encodeURIComponent(content))), branch: BRANCH };
  if (sha) body.sha = sha;
  const r = await fetch(
    'https://api.github.com/repos/' + OWNER + '/' + REPO + '/contents/' + encodeURIComponent(filePath),
    { method: 'PUT', headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
  );
  if (!r.ok) throw new Error('GitHub ' + r.status + ' — ' + filePath);
}

async function autoUpdate() {
  const inseeKey = document.getElementById('inseeKey').value.trim();
  const ghToken  = document.getElementById('ghToken').value.trim();
  if (!inseeKey) { alert('Clé API INSEE manquante.'); return; }
  if (!ghToken)  { alert('Token GitHub manquant (scope repo).'); return; }

  const naf = currentNaf;
  const codes = Object.keys(DEPT_NAMES);
  const statusEl = document.getElementById('scanStatus');
  const btn = document.getElementById('btnAuto');
  btn.disabled = true;

  let done = 0, pushed = 0, empty = 0, errors = 0;

  for (const deptCode of codes) {
    statusEl.innerHTML = '<div class="spinner"></div> ' + deptCode + ' · ' + DEPT_NAMES[deptCode]
      + ' (' + (done + 1) + '/' + codes.length + ')';

    try {
      // 1. Requête SIRENE — 200 établissements actifs du département
      const q = 'periode(activitePrincipaleEtablissement:' + naf
        + ' AND etatAdministratifEtablissement:A) AND codePostalEtablissement:' + deptCode + '*';
      const etabs = await fetchSireneApi(q, inseeKey);

      if (!etabs.length) { empty++; done++; continue; }

      // 2. Géocodage de chaque établissement
      const exportData = [];
      for (const etab of etabs) {
        const coords = await geocodeEtab(etab);
        if (!coords) continue;
        const periode = etab.periodesEtablissement?.[0] || {};
        exportData.push({
          name:  getName(etab),
          siret: etab.siret || '',
          naf:   periode.activitePrincipaleEtablissement || naf,
          etat:  periode.etatAdministratifEtablissement || 'A',
          addr:  buildAddr(etab),
          lat:   coords.lat,
          lon:   coords.lon,
        });
      }

      if (!exportData.length) { empty++; done++; continue; }

      // 3. Génération du HTML
      const html = buildDeptExportHtml(exportData, naf, deptCode, DEPT_NAMES[deptCode]);

      // 4. Push GitHub
      const filePath = 'exports/sirene-' + nafSlug(naf) + '-' + deptCode + '.html';
      await pushFileToGithub(ghToken, filePath, html);
      pushed++;

    } catch (err) {
      console.error(deptCode, err);
      errors++;
    }

    done++;
  }

  btn.disabled = false;
  deptCounts = {}; // force rescan
  scanExports();
  statusEl.innerHTML = '⟳ ' + pushed + ' mis à jour · ' + empty + ' vides · '
    + (errors ? '<span style="color:var(--accent2)">' + errors + ' erreurs</span>' : '0 erreur');
}

function updateNaf() {
  currentNaf = document.getElementById('nafSelect').value;
  scanExports();
}
